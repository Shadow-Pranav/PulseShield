[mysqld]
basedir=D:/E_Commerce/mysql-local/mysql-8.4.8-winx64
datadir=D:/E_Commerce/mysql-local/data
port=3306
bind-address=127.0.0.1
mysqlx=0
max_connections=100
character-set-server=utf8mb4
collation-server=utf8mb4_unicode_ci
default-time-zone=+00:00
log-error=D:/E_Commerce/mysql-local/mysql-error.log
pid-file=D:/E_Commerce/mysql-local/mysql.pid

[client]
port=3306
user=root
default-character-set=utf8mb4
